name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: url_short
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      # single source of truth (used by both goose + tests)
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/url_short?sslmode=disable
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://postgres:postgres@localhost:5432/url_short?sslmode=disable
      GOOSE_MIGRATION_DIR: ./internal/migration

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go (with cache)
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: true

    - name: Install Goose
      run: go install github.com/pressly/goose/v3/cmd/goose@latest

    - name: Add Go bin to PATH
      run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      
    - name: Run Migrations
      run: goose up
    
    - name: Run tests with race detection
      run: go test -v -race ./...
      env:
        GOTOOLCHAIN: go1.25.0+auto
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test?sslmode=disable
    
    - name: Generate coverage report
      run: go test -v -coverprofile=coverage.out ./...
      env:
        GOTOOLCHAIN: go1.25.0+auto
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test?sslmode=disable
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.out
